{% extends 'blood_app/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center fw-bold">Login</h3>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-danger w-100 mt-3">Login</button>
            </form>
            <div class="mt-3 text-center">
                <small>Need an account? <a href="{% url 'register_donor' %}">Register here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
